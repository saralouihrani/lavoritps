<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sender</title>
</head>
<body>

<div class="container">
    <h2>Pagina Sender</h2>

    <label>Parametro 1</label>
    <input type="text" id="param1">

    <label>Parametro 2</label>
    <input type="text" id="param2">

    <button onclick="vaiReceiver()">Invia</button>
</div>

<script>
function vaiReceiver() {

    const parametro1 = document.getElementById("param1").value;
    const parametro2 = document.getElementById("param2").value;

    const url = "receiver.html?param1=" + parametro1 + "&param2=" + parametro2;

    window.location.href = url;
}
</script>

</body>
</html>
