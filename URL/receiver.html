<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Receiver</title>
</head>
<body>

<div class="container">
    <h2>Pagina Receiver</h2>

    <p id="risultato"></p>

    <button onclick="tornaSender()">Torna al Sender</button>
</div>

<script>

const queryString = window.location.search;

const parametri = new URLSearchParams(queryString);

const parametro1 = parametri.get("param1") || "Non inserito";
const parametro2 = parametri.get("param2") || "Non inserito";

document.getElementById("risultato").innerHTML =
    "Parametro 1: <strong>" + parametro1 + "</strong><br>" +
    "Parametro 2: <strong>" + parametro2 + "</strong>";

function tornaSender() {
    window.location.href = "sender.html";
}

</script>

</body>
</html>
